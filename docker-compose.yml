services:
  db:
    image: postgres:15
    container_name: municipal_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: municipal
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: municipal_adminer
    restart: always
    ports:
      - "8080:8080"

volumes:
  postgres_data: